name: release

# Cut a release by bumping `version` in the workspace Cargo.toml ([workspace.package] —
# the single source; tauri.conf.json has no version field and inherits it via
# src-tauri/Cargo.toml), then pushing a matching tag:
#   git tag v0.2.0 && git push origin v0.2.0
# (Keep the tag in sync — tauri-action names the release `v__VERSION__` from the
# resolved app version, so a `v0.2.0` tag and version = "0.2.0" align.)
# You can also run it manually from the Actions tab (workflow_dispatch).
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# Don't run overlapping builds for the same ref.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write # needed to create the GitHub Release + upload assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: --target aarch64-apple-darwin
          - platform: macos-latest # Intel
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          # On macOS build both arches so each matrix leg has its target available.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo (workspace target/ lives at the repo root)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install frontend dependencies
        # tauri-action runs the beforeBuildCommand (`npm run build`) from ui/, so its
        # node_modules must exist first. package-lock.json is committed under ui/.
        run: npm --prefix ui ci

      - name: Build the app and publish a (draft) release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # __VERSION__ resolves from the app version (workspace Cargo.toml)
          releaseName: GPBeam v__VERSION__
          releaseBody: |
            Download the asset for your platform below.

            These builds are **unsigned / not notarized** — verify the SHA-256 checksum
            asset for your platform after downloading. First launch:
            - macOS: right-click the app → Open (once) to bypass Gatekeeper.
            - Windows: "More info" → "Run anyway" on the SmartScreen prompt.
          releaseDraft: true # review the release, then publish it manually
          prerelease: false
          args: ${{ matrix.args }}

      - name: Attach SHA-256 checksums (unsigned builds — the only integrity check)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
        shell: bash
        run: |
          set -euo pipefail
          tag="$(echo '${{ steps.tauri.outputs.appVersion }}' | sed 's/^/v/')"
          out="SHA256SUMS-${{ runner.os }}-${{ runner.arch }}.txt"
          echo "$ARTIFACT_PATHS" | jq -r '.[]' | while read -r f; do
            [ -f "$f" ] || continue
            if command -v shasum >/dev/null; then shasum -a 256 "$f"; else sha256sum "$f"; fi
          done | sed 's|  .*/|  |' > "$out"
          cat "$out"
          gh release upload "$tag" "$out" --clobber
